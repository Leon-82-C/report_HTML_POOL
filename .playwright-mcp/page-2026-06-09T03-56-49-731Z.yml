          - heading "测序质量与错误率分布统计" [level=3] [ref=e103]
          - paragraph [ref=e104]: 测序错误率与碱基质量有关，受测序仪本身、测序试剂、样品等多个因素共同影响。对于Illumina高通量测序平台，测序质量和错误率分布具有两个特点：
          - list [ref=e105]:
            - listitem [ref=e106]: · 每个read的前几个碱基的测序质量一般较低，这是由于边合成边测序过程初始阶段，测序仪荧光感光元件对焦速度较慢。获取的荧光图像质量较低，导致碱基识别错误率较高。
            - listitem [ref=e107]: · 随着测序的进行，错误率会升高，测序质量降低，这是由于测试过程中荧光基团的不完全切割和de-phasing引起荧光信号衰减。
          - heading "质量分数与错误率换算关系" [level=4] [ref=e108]
          - paragraph [ref=e109]: 如果碱基的质量分数用Q表示，识别错误率用P表示，则碱基的质量分数和错误率能用以下公式表示：
          - generic [ref=e110]:
            - paragraph [ref=e111]:
              - strong [ref=e112]: Q = -10 × log₁₀P
            - paragraph [ref=e113]:
              - strong [ref=e114]: P = 10^(-Q/10)
