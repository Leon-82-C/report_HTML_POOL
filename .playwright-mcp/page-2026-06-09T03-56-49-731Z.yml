          - heading "原始数据过滤说明" [level=3] [ref=e142]
          - paragraph [ref=e143]: 测序得到的原始测序序列，里面含有带接头的、低质量的reads。为了保证信息分析质量，需要对raw reads进行精细过滤，得到clean reads，后续分析都基于clean reads进行。
          - heading "数据处理步骤：" [level=3] [ref=e144]
          - list [ref=e145]:
            - listitem [ref=e146]: 去除长度小于50的reads对；
            - listitem [ref=e147]: reads中N碱基的比例大于10%时，需要去除此对reads；
            - listitem [ref=e148]: 去除Q20小于80%的reads对（Q20指reads的碱基质量分数大于等于20）。
