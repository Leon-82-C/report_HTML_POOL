            - text: 项目摘要
          - heading "技术概述" [level=3] [ref=e79]
          - paragraph [ref=e80]: gRNA文库构建基本原理是通过一段与靶标DNA相同的gRNA指导Cas9核酸酶对靶向基因进行DNA修饰，以此造成基因的功能突变或缺失。在此基础上，利用CRISPR/Cas9技术建立哺乳动物全基因组突变库或者与某类功能相关的基因突变体库，通过功能性筛选和富集以及随后的PCR扩增和深度测序分析，发掘与筛选表型相关的基因，称为 CRISPR/Cas9 gRNA文库筛选。
          - heading "gRNA文库应用" [level=3] [ref=e81]
          - paragraph [ref=e82]: gRNA文库是药物筛选或靶向筛选特定通路的理想工具，gRNA文库的建立将在功能基因筛选、疾病机制研究及药物研发等方面发挥重要的功能。gRNA文库包括全基因组文库、lncRNA文库、信号通路、细胞凋亡、细胞增殖、离子通道、核受体相关、各种疾病相关等文库。
          - heading "实验流程" [level=3] [ref=e83]
          - heading "1.1 文库制备" [level=4] [ref=e84]
          - paragraph [ref=e85]: DNA样品经DNA片段化(Shear)、末端补平(End repair)、片段3端加A尾(Add 3'A Tail)、连接接头(Ligate Adapters)、片段筛选(Clean)、PCR扩增(Enrich with PCR)、片段筛选(Clean)、PCR产物质检(QC)等步骤构建形成Illumina平台高通量测序文库。
          - img "文库制备流程图" [ref=e87]
          - heading "1.2 测序" [level=4] [ref=e88]
          - paragraph [ref=e89]: Illumina平台上机测序，采用双端150bp测序模式。fastq是测序数据下机格式，其中包含测序序列(reads)的序列信息，及其对应的测序质量信息。fastq格式文件中每个read由四行描述，如下：
          - heading "1.3 数据分析" [level=4] [ref=e90]
          - paragraph [ref=e91]: 本报告使用MAGeCKFlute进行CRISPR文库筛选数据的分析。MAGeCKFlute是一个综合性的CRISPR筛选数据分析工具，整合了MAGeCK和MAGeCKFlute的功能，能够进行sgRNA级别的质量控制、基因水平的阳性/阴性筛选、以及下游富集分析。
          - heading "1.3.1 测序数据质控" [level=4] [ref=e92]
          - paragraph [ref=e93]: 对原始测序数据进行质量控制（QC），去除低质量 Reads 和接头污染序列，获得 Clean Reads 用于后续分析。
          - heading "1.3.2 Reads 比对" [level=4] [ref=e94]
          - paragraph [ref=e95]: 将 Clean Reads 与 sgRNA 文库参考序列进行比对，提取并统计各 sgRNA 的 Reads 数目。
          - heading "1.3.3 统计分析" [level=4] [ref=e96]
          - paragraph [ref=e97]: 对比对结果进行统计分析，包括比对上的 Reads 数量、覆盖的 sgRNA 和基因数目、覆盖率及Reads 均一性等质控指标。
